# ======================
# APPLICATION NAME
# ======================
spring.application.name=inventory-system

# ======================
# SERVER PORT (IMPORTANT FOR DEPLOYMENT)
# ======================
server.port=${PORT:8081}

# ======================
# DATABASE CONFIG (MySQL LOCAL)
# ======================
spring.datasource.url=jdbc:mysql://localhost:3306/ims?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ======================
# JPA / HIBERNATE
# ======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ======================
# THYMELEAF (FIXED)
# ======================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false