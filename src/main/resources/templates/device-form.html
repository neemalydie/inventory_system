<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register Device</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; }
        .sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100%; background: #2c3e50; color: white; padding-top: 20px; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; }
        .sidebar a { display: block; padding: 12px 20px; color: white; text-decoration: none; }
        .sidebar a:hover { background: #34495e; }
        .main-content { margin-left: 260px; padding: 20px; }
        .header { background: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .form-container { background: white; padding: 30px; border-radius: 8px; max-width: 600px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #3498db; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .logout-btn { background: #e74c3c; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>📦AIRTEL IMS</h2>
        <a href="/dashboard">📊 Dashboard</a>
        <a href="/devices/register" style="background:#3498db">➕ Register Device</a>
        <a href="/employees/register">👤 Register Employee</a>
        <a href="/assignments/new">📥 Assign Device</a>
        <a href="/assignments/return">📥 Return Device</a>
        <a href="/search">🔍 Search & Filter</a>
        <a href="/reports">📊 Reports</a>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h1>Register New Device</h1>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
        
        <div class="form-container">
            <form th:action="@{/devices/register}" th:object="${device}" method="post">
                <div class="form-group">
                    <label>Serial Number *</label>
                    <input type="text" th:field="*{serialNumber}" required>
                </div>
                <div class="form-group">
                    <label>Device Type *</label>
                    <select th:field="*{deviceType}" required>
                        <option value="">Select</option>
                        <option value="LAPTOP">Laptop</option>
                        <option value="DESKTOP">Desktop</option>
                        <option value="MOBILE">Mobile Phone</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Brand</label>
                    <input type="text" th:field="*{brand}">
                </div>
                <div class="form-group">
                    <label>Model</label>
                    <input type="text" th:field="*{model}">
                </div>
                <div class="form-group">
                    <label>RAM</label>
                    <input type="text" th:field="*{ram}" placeholder="e.g., 16GB">
                </div>
                <div class="form-group">
                    <label>Storage</label>
                    <input type="text" th:field="*{storage}" placeholder="e.g., 512GB SSD">
                </div>
                <div class="form-group">
                    <label>Condition *</label>
                    <select th:field="*{condition}" required>
                        <option th:each="c : ${conditions}" th:value="${c}" th:text="${c}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea th:field="*{notes}" rows="3"></textarea>
                </div>
                <button type="submit">Register Device</button>
            </form>
        </div>
    </div>
</body>
</html>
