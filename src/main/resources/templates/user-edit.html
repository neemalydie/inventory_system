<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User - Airtel IMS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; }
        .sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100%; background: #2c3e50; color: white; padding-top: 20px; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; }
        .sidebar a { display: block; padding: 12px 20px; color: white; text-decoration: none; }
        .sidebar a:hover { background: #34495e; }
        .main-content { margin-left: 260px; padding: 20px; }
        .header { background: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .logout-btn { background: #e74c3c; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; }
        .form-container { background: white; padding: 30px; border-radius: 8px; max-width: 600px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #3498db; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .cancel { background: #95a5a6; margin-left: 10px; }
        .note { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>📦AIRTEL IMS</h2>
        <a href="/dashboard">📊 Dashboard</a>
        <a href="/devices/list">📱 Devices</a>
        <a href="/employees/list">👤 Employees</a>
        <a href="/users/list" style="background:#3498db">👥 User Management</a>
        <a href="/assignments/active">📋 Assignments</a>
        <a href="/reports">📊 Reports</a>
        <a href="/logout" class="logout-btn" style="margin-top: 50px;">Logout</a>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h1>Edit User</h1>
            <span>Logged in as: Admin</span>
        </div>
        
        <div class="form-container">
            <form th:action="@{/users/edit/{id}(id=${user.id})}" th:object="${user}" method="post">
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" th:field="*{username}" required>
                </div>
                <div class="form-group">
                    <label>Password (leave blank to keep current)</label>
                    <input type="password" th:field="*{password}">
                    <div class="note">Only enter if you want to change password</div>
                </div>
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" th:field="*{fullName}" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}">
                </div>
                <div class="form-group">
                    <label>Role *</label>
                    <select th:field="*{role}" required>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select th:field="*{enabled}">
                        <option th:value="true">Active</option>
                        <option th:value="false">Disabled</option>
                    </select>
                </div>
                <button type="submit">Update User</button>
                <a href="/users/list"><button type="button" class="cancel">Cancel</button></a>
            </form>
        </div>
    </div>
</body>
</html>
