<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Employee - Airtel Inventory</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; }
        .sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100%; background: #2c3e50; color: white; padding-top: 20px; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; }
        .sidebar a { display: block; padding: 12px 20px; color: white; text-decoration: none; }
        .sidebar a:hover { background: #34495e; }
        .main-content { margin-left: 260px; padding: 20px; }
        .header { background: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .logout-btn { background: #e74c3c; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; }
        .form-container { background: white; padding: 30px; border-radius: 8px; max-width: 600px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #3498db; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .cancel { background: #95a5a6; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>📦AIRTEL IMS</h2>
        <a href="/dashboard">📊 Dashboard</a>
        <a href="/devices/register">➕ Register Device</a>
        <a href="/devices/list">📱 Device List</a>
        <a href="/employees/register">👤 Register Employee</a>
        <a href="/employees/list">👥 Employee List</a>
        <a href="/assignments/new">📥 Assign Device</a>
        <a href="/assignments/return">📥 Return Device</a>
        <a href="/assignments/active">📋 Active Assignments</a>
        <a href="/search">🔍 Search & Filter</a>
        <a href="/reports">📊 Reports</a>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h1>Edit Employee</h1>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
        
        <div class="form-container">
            <form th:action="@{/employees/edit/{id}(id=${employee.id})}" th:object="${employee}" method="post">
                <div class="form-group">
                    <label>Employee ID *</label>
                    <input type="text" th:field="*{employeeId}" required>
                </div>
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" th:field="*{fullName}" required>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" th:field="*{department}">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" th:field="*{phoneNumber}">
                </div>
                <button type="submit">Update Employee</button>
                <a href="/employees/list"><button type="button" class="cancel">Cancel</button></a>
            </form>
        </div>
    </div>
</body>
</html>
