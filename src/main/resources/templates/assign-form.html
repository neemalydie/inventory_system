<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Assign Device</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; }
        .sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100%; background: #2c3e50; color: white; padding-top: 20px; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; }
        .sidebar a { display: block; padding: 12px 20px; color: white; text-decoration: none; }
        .sidebar a:hover { background: #34495e; }
        .main-content { margin-left: 260px; padding: 20px; }
        .header { background: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .form-container { background: white; padding: 30px; border-radius: 8px; max-width: 600px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #27ae60; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .logout-btn { background: #e74c3c; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; }
        .info { background: #e8f0fe; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>📦AIRTEL IMS</h2>
        <a href="/dashboard">📊 Dashboard</a>
        <a href="/devices/register">➕ Register Device</a>
        <a href="/employees/register">👤 Register Employee</a>
        <a href="/assignments/new" style="background:#3498db">📤 Assign Device</a>
        <a href="/assignments/return">📥 Return Device</a>
        <a href="/search">🔍 Search & Filter</a>
        <a href="/reports">📊 Reports</a>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h1>Assign Device to Employee</h1>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
        
        <div class="form-container">
            <div class="info">
                <strong>Note:</strong> Only available devices are shown below.
            </div>
            <form method="post">
                <div class="form-group">
                    <label>Select Device *</label>
                    <select name="deviceId" required>
                        <option value="">Select Device</option>
                        <option th:each="d : ${devices}" th:value="${d.id}" 
                            th:text="${d.serialNumber} + ' - ' + ${d.brand} + ' ' + ${d.model}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Employee *</label>
                    <select name="employeeId" required>
                        <option value="">Select Employee</option>
                        <option th:each="e : ${employees}" th:value="${e.id}" 
                            th:text="${e.employeeId} + ' - ' + ${e.fullName}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Purpose *</label>
                    <input type="text" name="purpose" required style="width:100%;padding:10px;">
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea name="notes" rows="3"></textarea>
                </div>
                <button type="submit">Assign Device</button>
            </form>
        </div>
    </div>
</body>
</html>
